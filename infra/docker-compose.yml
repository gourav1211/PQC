version: "3.9"

# H2A-PQC Virtual Testbed
# Post-Quantum Cryptography Integration in IoT Devices

networks:
  h2a-pqc-net:
    driver: bridge
    name: h2a-pqc-network

volumes:
  mongodb-data:
    name: h2a-pqc-mongodb-data

services:
  # =============================================================================
  # TIER 3: Database Layer
  # =============================================================================
  mongodb:
    image: mongo:7.0
    container_name: h2a-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-h2a_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-h2a_secret}
      MONGO_INITDB_DATABASE: h2a_pqc
    volumes:
      - mongodb-data:/data/db
    networks:
      - h2a-pqc-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: h2a-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-h2a_admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-h2a_secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-h2a_admin}:${MONGO_PASSWORD:-h2a_secret}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - h2a-pqc-net

